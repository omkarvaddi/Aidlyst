name: Friday Build

on:
  push:
    paths:
      - 'Friday/**'
      - '.github/workflows/friday-build.yml'
  pull_request:
    paths:
      - 'Friday/**'
      - '.github/workflows/friday-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Friday
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Friday/package-lock.json
      - run: npm install
      - run: npm run build
